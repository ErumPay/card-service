server:
  port: 8082

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: card-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

auth:
  base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8081}

billing-key:
  base-url: ${BILLING_KEY_SERVICE_BASE_URL:http://localhost:8092}

card:
  billing-key:
    aes-key: ${CARD_BILLING_KEY_AES_KEY}
