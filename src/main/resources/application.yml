server:
  port: 8082

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: card-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://erumpay-zipkin.platform-operations.svc.cluster.local:9411/api/v2/spans}

auth:
  base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8081}

billing-key:
  base-url: ${BILLING_KEY_SERVICE_BASE_URL:http://localhost:8092}

card-simulator:
  base-url: ${CARD_SIMULATOR_BASE_URL:http://localhost:8095}

card:
  billing-key:
    aes-key: ${CARD_BILLING_KEY_AES_KEY}
  notification:
    topic: ${CARD_NOTIFICATION_TOPIC:card.event}
